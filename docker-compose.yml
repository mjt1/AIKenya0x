services:
  # --- AI Service (FastAPI / Python) ------------------------------------------
  # The embedding model is baked into the image (see ai/Dockerfile), so no cache
  # volume or runtime download is needed.
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: suluhu-ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./ai/.env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - suluhu

  # --- Backend Service (NestJS / Node) ----------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: suluhu-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - AI_SERVICE_URL=http://ai:8001
    depends_on:
      ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - suluhu

  # --- Frontend Service (Next.js) ---------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: suluhu-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - suluhu

networks:
  suluhu:
    driver: bridge
