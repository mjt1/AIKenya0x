services:
  neo4j:
    image: neo4j:5.26
    container_name: suluhu-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # HTTP browser
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/changeme
    volumes:
      - neo4j_data:/data
    healthcheck:
      test:
        ["CMD-SHELL", "cypher-shell -u neo4j -p changeme 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - suluhu

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: suluhu-ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./ai/.env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - suluhu

  # --- Backend Service (NestJS / Node) ----------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: suluhu-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - AI_SERVICE_URL=http://ai:8001
      # Connect to the bundled Neo4j container. These override anything set in
      # ./backend/.env. For AuraDB, set NEO4J_URI to neo4j+s://your-instance...
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=changeme
      - NEO4J_DATABASE=neo4j
    depends_on:
      ai:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - suluhu

  # --- Frontend Service (Next.js) ---------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: suluhu-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - suluhu

volumes:
  neo4j_data:

networks:
  suluhu:
    driver: bridge
