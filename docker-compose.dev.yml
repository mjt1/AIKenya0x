services:
  neo4j:
    image: neo4j:5.26
    container_name: suluhu-neo4j-dev
    restart: unless-stopped
    ports:
      - "7474:7474" # HTTP browser
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/changeme
    volumes:
      - neo4j_data:/data
    healthcheck:
      test:
        ["CMD-SHELL", "cypher-shell -u neo4j -p changeme 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - suluhu

  # ── AI Service — unchanged in dev (Python reload handled by uvicorn --reload) ─
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: suluhu-ai-dev
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./ai/.env
    environment:
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
    volumes:
      - ai_model_cache:/app/.cache/huggingface
      # Mount source for live reload (uvicorn --reload watches /app/app)
      - ./ai/app:/app/app
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
        "--reload",
        "--log-level",
        "debug",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - suluhu

  # ── Backend — NestJS watch mode ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: suluhu-backend-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - AI_SERVICE_URL=http://ai:8001
      - NODE_ENV=development
      # Connect to the bundled Neo4j container (overrides ./backend/.env).
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=changeme
      - NEO4J_DATABASE=neo4j
    volumes:
      # Mount host source; node_modules stay in the container layer
      - ./backend/src:/app/src
      - ./backend/test:/app/test
      - ./backend/package.json:/app/package.json
    depends_on:
      ai:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - suluhu

  # ── Frontend — Next.js dev server (hot reload) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: suluhu-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    volumes:
      # Mount host source for hot reload; keep container's node_modules + .next
      # (assumes the dev image's WORKDIR is /app).
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_started
    networks:
      - suluhu

volumes:
  ai_model_cache:
  neo4j_data:

networks:
  suluhu:
    driver: bridge
